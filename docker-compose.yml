services:
  inventory-service:
    build: .
    container_name: inventory-service
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - DB_PATH=/app/data/inventory.db
    volumes:
      - inventory_data:/app/data
    networks:
      - inventory_network
    restart: unless-stopped

networks:
  inventory_network:
    name: prototype-webapp-service
    driver: bridge

volumes:
  inventory_data:
    driver: local
